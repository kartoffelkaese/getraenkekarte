<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - Getränkekarte</title>
    <link rel="icon" type="image/png" href="images/schlegl-app-icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
    <style>
        .schedule-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .schedule-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .schedule-frame.active {
            opacity: 1;
        }

        .schedule-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

    </style>
</head>
<body
    data-schedule-config-api="/api/schedule-config"
    data-schedule-current-api="/api/schedule-config/current"
    data-schedule-changed-event="scheduleConfigChanged"
    data-schedule-reload-event="forceScheduleReload">
    <div class="schedule-container">
        <!-- Iframe-Container für alle Karten (Lazy Loading) -->
        <div class="schedule-frame" id="hauptthekeFrame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="italienische-nachtFrame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="weihnachtenFrame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="theke-hintenFrame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="theke-hinten-bilderFrame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="theke-hinten-bilder-dunkelFrame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="theke-hinten-2Frame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="hochzeitFrame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="hochzeit-dunkelFrame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="hochzeit-3spaltenFrame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="hochzeit-dunkel-3spaltenFrame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="jugendlicheFrame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="weihnachten-jugendlicheFrame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="speisekarteFrame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="bilderFrame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="screensaverFrame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="cycleFrame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="cycle-jugendFrame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="overview-1Frame">
            <iframe></iframe>
        </div>
        <div class="schedule-frame" id="overview-2Frame">
            <iframe></iframe>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/schedule-player.js"></script>
</body>
</html>
