<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Getränkekarte - Cycle 2</title>
    <link rel="icon" type="image/png" href="images/schlegl-app-icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
    <style>
        .cycle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .cycle-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .cycle-frame.active {
            opacity: 1;
        }

        .cycle-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body data-cycle-type="jugend">
    <div class="cycle-container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/cycle-player.js"></script>
</body>
</html>
