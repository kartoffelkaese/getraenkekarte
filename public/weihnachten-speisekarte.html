<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speisekarte - Weihnachten</title>
    <link rel="icon" type="image/png" href="images/schlegl-app-icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
    <link href="/css/speisekarte.css" rel="stylesheet">
    <link href="/css/weihnachten-speisekarte.css" rel="stylesheet">
</head>
<body class="speisekarte-page weihnachten-speisekarte">
    <canvas id="sparklesCanvas"></canvas>
    <div class="menu-container">
        <div class="logo-container">
            <img src="images/logo.png" alt="Logo">
        </div>
        <h1 class="menu-title">Speisekarte</h1>
        <div class="menu-grid" id="menuContent">
            <!-- Hier werden die Gerichte dynamisch eingefügt -->
        </div>
    </div>

    <div class="speisekarte-hinweis" role="note" aria-label="Hinweis zu Zusatzstoffen">
        <small>Eine Liste der Zusatzstoffe und Allergene ist an der Bar erhältlich.</small>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/speisekarte.js"></script>
</body>
</html>
